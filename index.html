<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>8/3 Cho Nhi 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}

html,body{
  height:100%;
  overflow:hidden;
  font-family:'Quicksand',sans-serif;
  text-align:center;
  background:#0d0010;
}

/* ── Aurora background ── */
.aurora{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 30%,rgba(255,100,180,0.35),transparent 60%),
    radial-gradient(ellipse 70% 50% at 80% 70%,rgba(160,80,255,0.35),transparent 60%),
    radial-gradient(ellipse 60% 40% at 50% 50%,rgba(255,180,220,0.15),transparent 70%),
    linear-gradient(135deg,#120020,#0d0018,#1a0025);
  background-size:400% 400%;
  animation:auroraMove 20s ease infinite;
}

/* ── Frosted glass blur overlay ── */
.blur-overlay{
  position:fixed;inset:0;z-index:1;
  background:rgba(30,10,40,0.15);
  backdrop-filter:blur(8px);
  pointer-events:none;
}

/* ── Rotating images carousel ── */
.carousel-container{
  position:fixed;
  top:35%;left:50%;
  transform:translate(-50%,-50%);
  z-index:0;
  width:280px;
  height:280px;
  pointer-events:none;
  display:flex;
  align-items:center;
  justify-content:center;
}

.carousel-image{
  position:absolute;
  width:280px;
  height:280px;
  object-fit:cover;
  border-radius:16px;
  opacity:0;
  animation:imageFade 15s ease-in-out infinite;
  will-change:opacity;
}

@keyframes imageFade{
  0%{opacity:0;}
  15%{opacity:1;}
  40%{opacity:1;}
  55%{opacity:0;}
  100%{opacity:0;}
}

.carousel-image:nth-child(1){animation-delay:0s;}
.carousel-image:nth-child(2){animation-delay:-2.5s;}
.carousel-image:nth-child(3){animation-delay:-5s;}
.carousel-image:nth-child(4){animation-delay:-7.5s;}
.carousel-image:nth-child(5){animation-delay:-10s;}
.carousel-image:nth-child(6){animation-delay:-12.5s;}

@keyframes auroraMove{
  0%{background-position:0% 0%;}
  33%{background-position:100% 50%;}
  66%{background-position:50% 100%;}
  100%{background-position:0% 0%;}
}

/* ── Stars ── */
.star{position:fixed;background:#fff;border-radius:50%;animation:twinkle ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:.1;}50%{opacity:.9;}}

/* ── Floating hearts ── */
.heart{position:fixed;animation:floatUp linear infinite;pointer-events:none;}
@keyframes floatUp{
  0%{transform:translateY(110vh) scale(0.5);opacity:0;}
  10%{opacity:.7;}
  90%{opacity:.4;}
  100%{transform:translateY(-20vh) scale(1.2);opacity:0;}
}

/* ── Falling petals ── */
.petal{position:fixed;animation:petalFall linear infinite;pointer-events:none;}
@keyframes petalFall{
  0%{transform:translateY(-10vh) rotate(0deg);opacity:0;}
  10%{opacity:.8;}
  90%{opacity:.4;}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0;}
}

/* ── Sparkles ── */
.sparkle{
  position:fixed;width:3px;height:3px;
  background:white;border-radius:50%;
  animation:sparklePop ease-in-out infinite;
}
@keyframes sparklePop{
  0%,100%{transform:scale(0);opacity:0;}
  50%{transform:scale(1);opacity:1;}
}

/* ── MAIN STAGE ── */
.stage{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:10;padding:20px;
}

/* ── Text fade animation ── */
.content-box{
  max-width:480px;width:100%;
  transition:opacity .8s ease, transform .8s ease;
  opacity:0;transform:translateY(30px);
}
.content-box.visible{opacity:1;transform:translateY(0);}
.content-box.exit{opacity:0;transform:translateY(-30px);}

/* ── Typing cursor ── */
.typed-text::after{
  content:'|';
  animation:blink .7s steps(1) infinite;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* ── Stage styles ── */
.main-title{
  font-family:'Pacifico',cursive;
  font-size:clamp(2rem,7vw,3.2rem);
  color:#fff;
  text-shadow:0 0 30px rgba(255,150,200,0.9),0 0 60px rgba(255,100,200,0.5);
  line-height:1.3;
}

.script-title{
  font-family:'Dancing Script',cursive;
  font-size:clamp(1.8rem,6vw,2.8rem);
  color:#ffb3d9;
  text-shadow:0 0 20px rgba(255,150,200,0.8);
}

.body-text{
  font-size:clamp(1rem,3.5vw,1.25rem);
  color:rgba(255,220,240,0.9);
  line-height:1.9;
  margin-top:18px;
}

.emoji-big{font-size:3.5rem;display:block;margin:12px auto;animation:beat 1.4s infinite;}
@keyframes beat{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}

.tap-hint{
  margin-top:22px;
  font-size:.9rem;
  color:rgba(255,200,230,0.6);
  animation:pulse 2s ease infinite;
}
@keyframes pulse{0%,100%{opacity:.4;}50%{opacity:1;}}

/* ── Promise cards ── */
.promise-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:18px;
}
.promise-card{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,180,220,0.3);
  border-radius:16px;
  padding:14px 10px;
  backdrop-filter:blur(10px);
  animation:cardPop .5s ease both;
}
@keyframes cardPop{
  from{opacity:0;transform:scale(0.8);}
  to{opacity:1;transform:scale(1);}
}
.promise-card .pc-emoji{font-size:1.8rem;}
.promise-card .pc-text{
  font-size:.82rem;
  color:rgba(255,210,235,0.9);
  margin-top:6px;
  line-height:1.4;
}

/* ── Wish ribbon ── */
.ribbon-wrap{margin-top:20px;}
.ribbon{
  display:inline-block;
  background:linear-gradient(90deg,#ff6eb4,#c97dff,#ff6eb4);
  background-size:200% auto;
  animation:ribbonShine 3s linear infinite;
  border-radius:30px;
  padding:10px 28px;
  font-family:'Dancing Script',cursive;
  font-size:1.4rem;
  color:#fff;
  letter-spacing:1px;
  box-shadow:0 4px 20px rgba(255,100,180,0.5);
}
@keyframes ribbonShine{
  to{background-position:200% center;}
}

/* ── Photo frame stage ── */
.photo-frame{
  width:min(220px,65vw);height:min(220px,65vw);
  border-radius:50%;
  border:4px solid rgba(255,180,220,0.6);
  box-shadow:0 0 30px rgba(255,100,200,0.5),inset 0 0 20px rgba(255,100,200,0.1);
  overflow:hidden;
  margin:0 auto 18px;
  background:rgba(255,255,255,0.05);
  display:flex;align-items:center;justify-content:center;
  font-size:5rem;
}

/* ── Love meter ── */
.love-meter-wrap{margin:18px auto 0;max-width:300px;}
.love-meter-label{font-size:.9rem;color:rgba(255,210,235,0.8);margin-bottom:8px;}
.love-meter-bar{
  height:12px;
  background:rgba(255,255,255,0.1);
  border-radius:20px;
  overflow:hidden;
  border:1px solid rgba(255,180,220,0.3);
}
.love-meter-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,#ff6eb4,#c97dff);
  border-radius:20px;
  transition:width 2s cubic-bezier(.17,.67,.35,1.1);
}

/* ── Confetti canvas ── */
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:200;}

/* ── Firework flash ── */
.flash-overlay{
  position:fixed;inset:0;
  background:rgba(255,200,230,0);
  z-index:300;
  pointer-events:none;
  transition:background .1s;
}
.flash-overlay.flash{background:rgba(255,200,230,0.5);}

/* ── Countdown to next 8/3 ── */
.countdown-wrap{
  margin-top:18px;
  display:flex;gap:12px;justify-content:center;
}
.cd-box{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,180,220,0.3);
  border-radius:14px;
  padding:10px 14px;
  min-width:58px;
  backdrop-filter:blur(8px);
}
.cd-num{
  font-family:'Pacifico',cursive;
  font-size:1.6rem;
  color:#ffb3d9;
  line-height:1;
}
.cd-label{font-size:.65rem;color:rgba(255,200,235,0.6);margin-top:4px;}

/* ── Bouquet Stage ── */
.bouquet-wrap{
  position:relative;
  display:flex;flex-direction:column;align-items:center;
}

.bouquet-svg-wrap{
  animation:bouquetEntrance 1.2s cubic-bezier(.17,.67,.35,1.2) both;
  transform-origin:bottom center;
  filter:drop-shadow(0 0 40px rgba(255,150,200,0.7)) drop-shadow(0 0 80px rgba(255,100,180,0.4));
}
@keyframes bouquetEntrance{
  0%{opacity:0;transform:scale(0.2) translateY(60px) rotate(-15deg);}
  60%{transform:scale(1.08) translateY(-10px) rotate(3deg);}
  80%{transform:scale(0.97) translateY(2px) rotate(-1deg);}
  100%{opacity:1;transform:scale(1) translateY(0) rotate(0deg);}
}

.bouquet-sway{
  animation:bouquetSway 4s ease-in-out infinite;
  transform-origin:bottom center;
  display:inline-block;
}
@keyframes bouquetSway{
  0%,100%{transform:rotate(-2deg);}
  50%{transform:rotate(2deg);}
}

.bouquet-glow{
  position:absolute;
  top:10%;left:50%;transform:translateX(-50%);
  width:260px;height:260px;
  background:radial-gradient(circle,rgba(255,150,200,0.35),transparent 70%);
  border-radius:50%;
  animation:glowPulse 2s ease-in-out infinite;
  pointer-events:none;
  z-index:-1;
}
@keyframes glowPulse{
  0%,100%{transform:translateX(-50%) scale(1);opacity:.7;}
  50%{transform:translateX(-50%) scale(1.2);opacity:1;}
}

.bouquet-message{
  margin-top:16px;
  animation:messageRise 1s ease both;
  animation-delay:.8s;
  opacity:0;
}
@keyframes messageRise{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

.bouquet-line{
  font-family:'Dancing Script',cursive;
  font-size:clamp(1.2rem,4.5vw,1.7rem);
  color:#ffb3d9;
  text-shadow:0 0 20px rgba(255,150,200,0.8);
  line-height:1.7;
}

.bouquet-sub{
  font-size:clamp(.85rem,3vw,1rem);
  color:rgba(255,210,235,0.8);
  margin-top:10px;
  line-height:1.7;
}

/* ── Music Player ── */
#music-player{
  position:fixed;
  bottom:18px;
  left:50%;transform:translateX(-50%);
  width:min(280px,88vw);
  background:rgba(10,0,20,0.85);
  backdrop-filter:blur(24px);
  border:1px solid rgba(255,150,200,0.2);
  border-radius:18px;
  padding:10px 14px 8px;
  z-index:9999;
  box-shadow:0 8px 40px rgba(0,0,0,0.7),0 0 20px rgba(255,100,180,0.15);
}

.mp-controls{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:8px;}
.mp-btn{background:none;border:none;color:#fff;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;opacity:.75;transition:opacity .2s,transform .15s;}
.mp-btn:hover{opacity:1;}
.mp-btn:active{transform:scale(.88);}
#mp-play-btn{width:32px;height:32px;background:linear-gradient(135deg,#ff6eb4,#c97dff);border-radius:50%;color:#fff;opacity:1;}
.mp-progress-wrap{display:flex;align-items:center;gap:6px;font-size:.65rem;color:rgba(255,255,255,.55);}
#mp-progress{flex:1;-webkit-appearance:none;appearance:none;height:3px;border-radius:4px;background:rgba(255,255,255,.15);outline:none;cursor:pointer;}
#mp-progress::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#ff6eb4;cursor:pointer;}

/* ── Bouquet PNG entrance ── */
@keyframes bouquetIn{
  0%{opacity:0;transform:scale(0.3) translateY(60px) rotate(-8deg);}
  60%{transform:scale(1.06) translateY(-8px) rotate(2deg);}
  80%{transform:scale(0.97) translateY(2px) rotate(-1deg);}
  100%{opacity:1;transform:scale(1) translateY(0) rotate(0deg);}
}

/* ── Love Popup ── */
#love-popup{
  position:fixed;inset:0;z-index:5000;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(6px);
  animation:popupFadeIn .5s ease both;
}
@keyframes popupFadeIn{from{opacity:0;}to{opacity:1;}}
.love-popup-box{
  background:linear-gradient(135deg,#1a0025,#2a0035);
  border:1px solid rgba(255,150,200,0.4);
  border-radius:24px;
  padding:28px 28px 22px;
  max-width:min(340px,88vw);
  text-align:center;
  box-shadow:0 0 60px rgba(255,80,180,0.3),0 0 120px rgba(180,50,255,0.2);
  animation:popupBounce .7s cubic-bezier(.17,.67,.35,1.25) both;
}
@keyframes popupBounce{
  from{transform:scale(0.5);opacity:0;}
  to{transform:scale(1);opacity:1;}
}
.love-popup-emoji{font-size:2.8rem;display:block;margin-bottom:12px;animation:beat 1.2s infinite;}
.love-popup-text{
  font-family:'Quicksand',sans-serif;
  font-size:1.02rem;
  color:rgba(255,220,240,0.95);
  line-height:1.7;
}
.love-popup-btn{
  margin-top:18px;
  display:inline-block;
  padding:10px 30px;
  border-radius:30px;
  background:linear-gradient(90deg,#ff6eb4,#c97dff);
  color:#fff;
  font-family:'Quicksand',sans-serif;
  font-size:1rem;
  font-weight:700;
  border:none;
  cursor:pointer;
  box-shadow:0 4px 20px rgba(255,100,180,0.4);
  transition:transform .15s;
}
.love-popup-btn:active{transform:scale(0.94);}

/* ── Flower Rain burst ── */
.flower-rain{
  position:fixed;
  pointer-events:none;
  z-index:500;
  font-size:22px;
  animation:flowerRainFall linear forwards;
  will-change:transform,opacity;
}
@keyframes flowerRainFall{
  0%  {transform:translateY(-80px) rotate(0deg) scale(0.6); opacity:0;}
  8%  {opacity:1;}
  85% {opacity:0.85;}
  100%{transform:translateY(110vh) rotate(var(--rot)) scale(1.1); opacity:0;}
}

/* ══════════════════════════════
   LETTER STAGE
══════════════════════════════ */
.letter-scene{
  position:relative;
  display:flex;flex-direction:column;
  align-items:center;
  width:100%;
}

/* Envelope */
.envelope{
  position:relative;
  width:min(320px,88vw);
  margin:0 auto;
}

/* Envelope body */
.env-body{
  position:relative;
  width:100%;
  padding-bottom:65%;
  border-radius:4px 4px 10px 10px;
  background:linear-gradient(160deg,#fff0f8,#ffe0f0);
  box-shadow:0 8px 40px rgba(200,50,120,0.25), 0 2px 8px rgba(0,0,0,0.12);
  overflow:hidden;
}
/* Envelope inner shading */
.env-body::after{
  content:'';
  position:absolute;inset:0;
  background:
    linear-gradient(135deg,rgba(255,150,200,0.18) 0%,transparent 50%),
    linear-gradient(225deg,rgba(255,150,200,0.18) 0%,transparent 50%);
  pointer-events:none;
}
/* Bottom V flap */
.env-flap-bottom{
  position:absolute;bottom:0;left:0;right:0;
  height:55%;
  overflow:hidden;
  pointer-events:none;
}
.env-flap-bottom::before{
  content:'';
  position:absolute;bottom:0;left:-2px;right:-2px;
  height:200%;
  background:linear-gradient(160deg,#ffc8e8,#ff8ec8);
  clip-path:polygon(0% 100%, 50% 0%, 100% 100%);
}
/* Left & right side flaps */
.env-side-left,.env-side-right{
  position:absolute;top:0;bottom:0;width:52%;
  pointer-events:none;
}
.env-side-left{
  left:0;
  background:linear-gradient(180deg,#ffb3d9,#ff80cc);
  clip-path:polygon(0 0, 100% 50%, 0 100%);
  opacity:0.55;
}
.env-side-right{
  right:0;
  background:linear-gradient(180deg,#ffb3d9,#ff80cc);
  clip-path:polygon(100% 0, 0 50%, 100% 100%);
  opacity:0.55;
}

/* Top flap — animates open */
.env-flap-top{
  position:absolute;top:0;left:-1px;right:-1px;
  height:55%;
  transform-origin:top center;
  transform:rotateX(0deg);
  animation:flapOpen 1.2s cubic-bezier(.4,0,.2,1) 0.5s both;
  z-index:10;
  transform-style:preserve-3d;
}
.env-flap-top::before{
  content:'';
  position:absolute;top:0;left:0;right:0;
  height:200%;
  background:linear-gradient(160deg,#ffd6ee,#ff6eb4 60%,#e040a0);
  clip-path:polygon(0% 0%, 50% 100%, 100% 0%);
  box-shadow:0 4px 16px rgba(200,50,120,0.2);
  backface-visibility:hidden;
}
@keyframes flapOpen{
  0%  {transform:perspective(600px) rotateX(0deg);}
  100%{transform:perspective(600px) rotateX(-155deg);}
}

/* Wax seal */
.env-seal{
  position:absolute;
  top:42%;left:50%;transform:translate(-50%,-50%);
  width:min(44px,12vw);height:min(44px,12vw);
  background:radial-gradient(circle at 35% 35%,#ff6b8a,#cc0044 60%,#880030);
  border-radius:50%;
  box-shadow:0 3px 12px rgba(200,0,60,0.5);
  display:flex;align-items:center;justify-content:center;
  font-size:min(20px,5.5vw);
  z-index:3;
  animation:sealPop .6s cubic-bezier(.17,.67,.35,1.3) 1.6s both;
}
@keyframes sealPop{
  from{transform:translate(-50%,-50%) scale(0);}
  to{transform:translate(-50%,-50%) scale(1);}
}

/* Letter paper rising from envelope */
.letter-paper{
  position:relative;
  width:min(300px,84vw);
  margin:0 auto;
  background:linear-gradient(160deg,#fffaf8,#fff5f8);
  border-radius:8px;
  box-shadow:0 6px 30px rgba(200,50,120,0.18),0 2px 8px rgba(0,0,0,0.10);
  padding:22px 20px 18px;
  margin-top:-200px;
  transform:translateY(40px);
  opacity:0;
  animation:letterRise 0.9s ease 1.5s both;
  z-index:5;
}
@keyframes letterRise{
  from{transform:translateY(40px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}
/* Decorative lines on paper */
.letter-lines{
  position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:8px;
}
.letter-lines::before{
  content:'';
  position:absolute;left:0;right:0;top:42px;
  height:calc(100% - 52px);
  background:repeating-linear-gradient(
    to bottom,
    transparent,
    transparent 27px,
    rgba(255,150,200,0.2) 27px,
    rgba(255,150,200,0.2) 28px
  );
}
/* Red margin line */
.letter-lines::after{
  content:'';
  position:absolute;top:0;bottom:0;left:38px;
  width:1px;
  background:rgba(255,100,150,0.35);
}

.letter-header{
  font-family:'Dancing Script',cursive;
  font-size:clamp(1.1rem,4vw,1.4rem);
  color:#cc2266;
  margin-bottom:10px;
  text-align:left;
  padding-left:26px;
  position:relative;z-index:1;
}
.letter-textarea{
  width:100%;
  min-height:min(160px,28vh);
  background:transparent;
  border:none;
  outline:none;
  resize:none;
  font-family:'Quicksand',sans-serif;
  font-size:clamp(0.88rem,3.2vw,1rem);
  color:#5a1a2a;
  line-height:27px;
  padding:0 4px 0 26px;
  position:relative;z-index:1;
  caret-color:#ee4488;
}
.letter-textarea::placeholder{
  color:rgba(200,100,140,0.5);
  font-style:italic;
}
.letter-footer{
  font-family:'Dancing Script',cursive;
  font-size:clamp(1rem,3.5vw,1.25rem);
  color:#cc2266;
  text-align:right;
  margin-top:8px;
  padding-right:8px;
  position:relative;z-index:1;
}

/* Heart decoration */
.letter-heart{
  text-align:center;
  font-size:1.4rem;
  margin-bottom:6px;
  position:relative;z-index:1;
  animation:beat 1.4s infinite;
}

/* Save button */
.letter-save-btn{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:14px;
  padding:9px 22px;
  border-radius:20px;
  background:linear-gradient(90deg,#ff6eb4,#c97dff);
  color:#fff;
  font-family:'Quicksand',sans-serif;
  font-size:0.88rem;font-weight:700;
  border:none;cursor:pointer;
  box-shadow:0 4px 16px rgba(255,100,180,0.35);
  transition:transform .15s;
}
.letter-save-btn:active{transform:scale(0.94);}
.letter-saved-msg{
  margin-top:8px;font-size:0.82rem;
  color:rgba(255,200,230,0.8);
  min-height:1.2em;
  animation:fadeUp .4s ease both;
}

/* ── Secret Letter Icon ── */
.secret-letter-icon{
  position:fixed;
  top:20px;
  right:20px;
  z-index:100;

const confCanvas=document.getElementById('confetti-canvas');
const ctx=confCanvas.getContext('2d');
confCanvas.width=window.innerWidth;confCanvas.height=window.innerHeight;
window.addEventListener('resize',()=>{confCanvas.width=window.innerWidth;confCanvas.height=window.innerHeight;});
let confetti=[];
let confettiActive=false;

function spawnConfetti(){
  confettiActive=true;
  for(let i=0;i<120;i++){
    confetti.push({
      x:Math.random()*confCanvas.width,y:-20,
      vx:(Math.random()-0.5)*6,vy:2+Math.random()*4,
      color:`hsl(${Math.random()*60+300},100%,70%)`,
      size:6+Math.random()*6,rotation:Math.random()*360,
      rotSpeed:(Math.random()-0.5)*8,life:1
    });
  }
}

function animateConfetti(){
  ctx.clearRect(0,0,confCanvas.width,confCanvas.height);
  confetti=confetti.filter(c=>{
    c.x+=c.vx;c.y+=c.vy;c.vy+=0.08;c.rotation+=c.rotSpeed;c.life-=0.008;
    if(c.life<=0||c.y>confCanvas.height)return false;
    ctx.save();ctx.globalAlpha=c.life;ctx.translate(c.x,c.y);ctx.rotate(c.rotation*Math.PI/180);
    ctx.fillStyle=c.color;ctx.fillRect(-c.size/2,-c.size/4,c.size,c.size/2);
    ctx.restore();return true;
  });
  requestAnimationFrame(animateConfetti);
}
animateConfetti();

/* ────────────────────────────────────────
   COUNTDOWN to next 8/3
──────────────────────────────────────── */
function getCountdown(){
  const now=new Date();
  let next=new Date(now.getFullYear(),2,8); // March 8
  if(now>=next) next=new Date(now.getFullYear()+1,2,8);
  const diff=next-now;
  const days=Math.floor(diff/86400000);
  const hours=Math.floor((diff%86400000)/3600000);
  const mins=Math.floor((diff%3600000)/60000);
  const secs=Math.floor((diff%60000)/1000);
  return{days,hours,mins,secs};
}

function updateCountdown(){
  const {days,hours,mins,secs}=getCountdown();
  const el=document.getElementById('cd-secs');
  if(el)el.textContent=secs;
  const em=document.getElementById('cd-mins');
  if(em)em.textContent=mins;
  const eh=document.getElementById('cd-hours');
  if(eh)eh.textContent=hours;
  const ed=document.getElementById('cd-days');
  if(ed)ed.textContent=days;
}
setInterval(updateCountdown,1000);

function triggerFlowerRain(){

      // Random rotation end
      const rot=(Math.random()-0.5)*720;

      // Slight delay spread so they don't all appear at once

      document.body.appendChild(el);
      // Remove after animation

        <div class="letter-area">Tại đây nó từng rất dài dòng , nhưng hiện tại những lời đó không còn quan trọng nữa. Bây giờ anh chỉ muốn nói là cảm ơn em, cảm ơn vì đã luôn ở bên anh. Anh đã thực sự may mắn khi có được người bạn gái như em, biết lắng nghe , cảm thông và chia sẻ với anh. Chúc em một ngày 8/3 thật vui vẻ 🌹. Mãi yêu em ❤️‍🔥</div>
        <div class="letter-footer">— Anh 🌹</div>
      </div>
    </div>
    <div class="tap-hint" style="margin-top:12px">Chạm để xem lại từ đầu</div>
  `,
];

let currentStage=0;
let transitioning=false;
let loveMeterDone=false;
let lovePopupShown=false;

function showLovePopup(){
  if(lovePopupShown) return;
  lovePopupShown=true;
  const overlay=document.createElement('div');
  overlay.id='love-popup';
  overlay.innerHTML=`
    <div class="love-popup-box">
      <span class="love-popup-emoji">💖</span>
      <div class="love-popup-text">
        Tất nhiên kết quả là <strong style="color:#ffb3d9">Much</strong> chứ không phải <em>Many</em>,<br>
        bởi vì nó không đếm được,<br>
        phải nói là <strong style="color:#ffb3d9">vô cực</strong> luôn ấy chứ 🥰
      </div>
      <button class="love-popup-btn" id="popup-close-btn">Dạ em hiểu rồi 💕</button>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('popup-close-btn').addEventListener('click',function(e){
    e.stopPropagation();
    overlay.style.animation='popupFadeIn .3s ease reverse forwards';
    setTimeout(()=>overlay.remove(),300);
  });
}

const contentBox=document.getElementById('content-box');

function renderStage(idx){
  contentBox.innerHTML=stages[idx]();
  // trigger love meter animation if stage 5
  if(idx===5){
    lovePopupShown=false;
    loveMeterDone=false;
    setTimeout(()=>{
      const fill=document.getElementById('love-fill');
      if(fill){
        // Slower: 4s transition
        fill.style.transition='width 4s cubic-bezier(.17,.67,.35,1.0)';
        fill.style.width='100%';
        // After meter finishes, show popup
        setTimeout(()=>{
          loveMeterDone=true;
          showLovePopup();
        },4200);
      }
    },400);
  }
  if(idx===6){setTimeout(updateCountdown,100);}
  if(idx===8){setTimeout(initBouquet,100);}
  if(idx===9){setTimeout(restoreLetter,600);}
}

function goToStage(idx){
  if(transitioning)return;
  transitioning=true;
  flashScreen();

  // Exit animation
  contentBox.classList.remove('visible');
  contentBox.classList.add('exit');

  setTimeout(()=>{
    contentBox.classList.remove('exit');
    renderStage(idx);
    // Entrance
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        contentBox.classList.add('visible');
        transitioning=false;
      });
    });

    // Flower rain on stage 1
    if(idx===1){triggerFlowerRain();}
    // Confetti on special stages
    if(idx===2||idx===7||idx===8){spawnConfetti();flashScreen();}
    if(idx===8){setTimeout(spawnConfetti,1200);}
    
    // Change music for Letter stage (stage 9)
    if(idx===9){
      changeMusic(MUSIC_LETTER);
    } else if(currentMusicUrl!==MUSIC_DEFAULT){
      changeMusic(MUSIC_DEFAULT);
    }
  },700);
}

// Initial render
renderStage(0);
setTimeout(()=>contentBox.classList.add('visible'),100);

// Tap handler
document.body.addEventListener('click',function(e){
  // Ignore music player clicks
  if(e.target.closest('#music-player'))return;
  // Ignore popup clicks
  if(e.target.closest('#love-popup'))return;
  if(e.target.closest('.letter-paper'))return;
  // Ignore secret letter icon clicks
  if(e.target.closest('#secret-letter-icon'))return;
  // Block navigation if on love meter stage and not done yet
  if(currentStage===5 && !loveMeterDone) return;
  
  // Navigate: stage 0-7 go next, stage 8 or 9 loop back to 0
  let next=currentStage+1;
  if(next>=9){  // Stop at stage 8, don't auto go to stage 9
    next=0; // Loop back to start
  }
  currentStage=next;
  goToStage(currentStage);
});

/* ────────────────────────────────────────
   MUSIC PLAYER
──────────────────────────────────────── */
const audioPlayer=document.getElementById('audio-player');
let isPlaying=false;
let progressInterval;

// URLs nhạc nền
const MUSIC_DEFAULT='sound/Nắng_Ấm_Trong_Tim_Lofi_Ver_-_Duongg_x_Will_M_Lạc_vào_khu_rừng_hoa_Lyrics_Video_KituChat.mp3';
const MUSIC_LETTER='sound/ytsavecom-youtube-cam-on-nguoi-da-thuc-cung-toi-original-s-media-6hv80f1-9uq-00_9BTIYYu1.mp3';
let currentMusicUrl=MUSIC_DEFAULT;

// Function thay đổi nhạc
function changeMusic(musicUrl){
  // Chỉ thay đổi nếu URL khác
  if(currentMusicUrl===musicUrl)return;
  
  const wasPlaying=!audioPlayer.paused;
  const currentTime=audioPlayer.currentTime;
  
  audioPlayer.pause();
  audioPlayer.src=musicUrl;
  audioPlayer.load();
  currentMusicUrl=musicUrl;
  
  if(wasPlaying){
    audioPlayer.play().catch(()=>{});
  }
}

audioPlayer.loop=true;

window.addEventListener('load',()=>{
  audioPlayer.play().catch(()=>{});
});
document.body.addEventListener('click',()=>{
  if(!isPlaying&&audioPlayer.paused){audioPlayer.play().catch(()=>{});}
},{once:true});

audioPlayer.addEventListener('loadedmetadata',updateDuration);
audioPlayer.addEventListener('play',()=>{
  isPlaying=true;showPauseIcon();
  progressInterval=setInterval(updateProgress,500);
});
audioPlayer.addEventListener('pause',()=>{
  isPlaying=false;showPlayIcon();clearInterval(progressInterval);
});

function fmt(s){s=Math.floor(s||0);return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;}
function updateDuration(){document.getElementById('mp-dur').textContent=fmt(audioPlayer.duration);}
function updateProgress(){
  const cur=audioPlayer.currentTime,dur=audioPlayer.duration;
  document.getElementById('mp-cur').textContent=fmt(cur);
  document.getElementById('mp-dur').textContent=fmt(dur);
  if(dur)document.getElementById('mp-progress').value=(cur/dur)*100;
}
function showPlayIcon(){document.getElementById('mp-play-icon').style.display='';document.getElementById('mp-pause-icon').style.display='none';}
function showPauseIcon(){document.getElementById('mp-play-icon').style.display='none';document.getElementById('mp-pause-icon').style.display='';}

document.getElementById('mp-play-btn').addEventListener('click',e=>{e.stopPropagation();isPlaying?audioPlayer.pause():audioPlayer.play();});
document.getElementById('mp-prev').addEventListener('click',e=>{e.stopPropagation();audioPlayer.currentTime=0;});
document.getElementById('mp-next').addEventListener('click',e=>{e.stopPropagation();audioPlayer.currentTime=0;});
document.getElementById('mp-shuffle').addEventListener('click',e=>e.stopPropagation());
document.getElementById('mp-repeat').addEventListener('click',e=>e.stopPropagation());
document.getElementById('mp-progress').addEventListener('input',function(e){
  e.stopPropagation();
  if(audioPlayer.duration)audioPlayer.currentTime=(this.value/100)*audioPlayer.duration;
});
document.getElementById('music-player').addEventListener('click',e=>e.stopPropagation());

document.getElementById('secret-letter-icon').addEventListener('click',function(e){
  e.stopPropagation();
  currentStage=9;
  goToStage(9);
});
